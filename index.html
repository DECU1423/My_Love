<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación 3D - Corregida</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0c;
        }
        svg {
            display: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
    <!-- Librerías estables vía CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Curva SVG de origen -->
    <svg>
        <path id="curva" d="M 10,50 C 40,10 60,90 90,50 M 90,50 C 120,10 140,90 190,50" />
    </svg>

    <script>
        // 1. Escenario 3D
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 150;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // 2. Timeline de GSAP (Animación en bucle)
        const tl = gsap.timeline({ repeat: -1, yoyo: true });

        // 3. Procesar el código de tu imagen
        const path = document.querySelector("#curva");
        const length = path.getTotalLength();
        const vertices = [];

        // Generamos los vectores dinámicos
        for (let i = 0; i < length; i += 0.2) { // Cambiado a 0.2 para mejor rendimiento
            const point = path.getPointAtLength(i);
            const vector = new THREE.Vector3(point.x - 100, -(point.y - 50), 0);
            
            vector.x += (Math.random() - 0.5) * 30;
            vector.y += (Math.random() - 0.5) * 30;
            vector.z += (Math.random() - 0.5) * 70;
            
            vertices.push(vector);
            
            tl.from(vector, {
                x: (600 / 2) - 100,
                y: (-552 / 2) + 50,
                z: 0,
                ease: "power2.inOut",
                duration: "random(2, 4)"
            },
            i * 0.003
            );
        }

        // 4. Crear la malla de puntos en la GPU
        const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
        const material = new THREE.PointsMaterial({ 
            color: 0x00ffcc, 
            size: 1.5, 
            transparent: true, 
            opacity: 0.8 
        });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // 5. Bucle de renderizado nativo y seguro
        function animate() {
            requestAnimationFrame(animate);

            // Actualización segura de posiciones en memoria WebGL
            const positions = geometry.attributes.position.array;
            let index = 0;
            for (let j = 0; j < vertices.length; j++) {
                positions[index++] = vertices[j].x;
                positions[index++] = vertices[j].y;
                positions[index++] = vertices[j].z;
            }
            geometry.attributes.position.needsUpdate = true;

            // Rotación suave del objeto 3D
            particles.rotation.y += 0.002;

            renderer.render(scene, camera);
        }
        animate();

        // Redimensionar pantalla
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
