<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paratimamacita_Teamooooo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
        }
        svg {
            display: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
    <!-- Librerías necesarias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Trazado SVG del corazón -->
    <svg width="600" height="552" viewBox="0 0 600 552">
        <path id="corazon" d="M 300, 140 
             C 300, 140 240, 40 140, 40 
             C 40, 40 40, 160 40, 160 
             C 40, 260 180, 380 300, 480 
             C 420, 380 560, 260 560, 160 
             C 560, 160 560, 40 460, 40 
             C 360, 40 300, 140 300, 140 Z" />
    </svg>

    <script>
        // 1. Configuración de la Escena 3D
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        
        // Función para calcular la distancia ideal de la cámara según el ancho de la pantalla
        function obtenerDistanciaCamara() {
            const ancho = window.innerWidth;
            if (ancho < 500) {
                return 750; // Pantallas de celular (muy lejos para que quepa verticalmente)
            } else if (ancho < 900) {
                return 600; // Tablets o pantallas medianas
            } else {
                return 480; // Computadoras de escritorio (distancia estándar)
            }
        }

        // Posicionamos la cámara usando la distancia responsiva calculada
        camera.position.set(300, -260, obtenerDistanciaCamara()); 
        camera.lookAt(300, -260, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Generador de textura suave para las partículas
        function crearTexturaParticula() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');      
            gradient.addColorStop(0.2, 'rgba(255, 80, 160, 0.9)');    
            gradient.addColorStop(0.5, 'rgba(255, 30, 120, 0.3)');    
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');              
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        // Timeline de GSAP
        const tl = gsap.timeline({ repeat: -1, yoyo: true, repeatDelay: 1.5 });

        // 2. Procesamiento del SVG (Código original de la imagen)
        const path = document.querySelector("#corazon");
        const length = path.getTotalLength();
        const vertices = [];

        for (let i = 0; i < length; i += 0.1) {
            const point = path.getPointAtLength(i);
            const vector = new THREE.Vector3(point.x, -point.y, 0);
            
            vector.x += (Math.random() - 0.5) * 30;
            vector.y += (Math.random() - 0.5) * 30;
            vector.z += (Math.random() - 0.5) * 70;
            
            vertices.push(vector);
            
            tl.from(vector, {
                x: 600 / 2,
                y: -552 / 2,
                z: 0,
                ease: "power2.inOut",
                duration: "random(2, 5)"
            },
            i * 0.002
            );
        }

        // 3. Creación de las partículas
        const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
        const material = new THREE.PointsMaterial({ 
            size: 3.5, 
            map: crearTexturaParticula(),
            transparent: true, 
            blending: THREE.AdditiveBlending, 
            depthWrite: false
        });
        
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // Bucle de animación
        function animate() {
            requestAnimationFrame(animate);

            geometry.setFromPoints(vertices);
            geometry.attributes.position.needsUpdate = true;

            // Rotación sutil
            particles.rotation.y = Math.sin(Date.now() * 0.001) * 0.15;

            renderer.render(scene, camera);
        }
        animate();

        // Evento adaptativo al redimensionar la ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.position.z = obtenerDistanciaCamara(); // Actualiza la distancia de zoom dinámicamente
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
