<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación 3D - Three.js & GSAP</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0c;
        }
        /* Ocultamos el SVG original; solo usamos sus datos matemáticos */
        svg {
            display: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
    <!-- Cargamos las librerías necesarias: Three.js y GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Curva SVG de ejemplo para que el código extraiga el "path" -->
    <svg>
        <path id="curva" d="M 10,50 C 40,10 60,90 90,50 M 90,50 C 120,10 140,90 190,50" />
    </svg>

    <script>
        // 1. Configuración del escenario 3D (Three.js)
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 120;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // 2. Inicialización de la línea de tiempo de GSAP (en bucle continuo)
        const tl = gsap.timeline({ repeat: -1, yoyo: true });

        // EL CÓDIGO DE TU IMAGEN (Adaptado para interactuar con la escena 3D):
        const path = document.querySelector("#curva");
        const length = path.getTotalLength();
        const vertices = [];

        for (let i = 0; i < length; i += 0.1) {
            const point = path.getPointAtLength(i);
            // Centramos los puntos del SVG en el origen 3D (-100 y +50)
            const vector = new THREE.Vector3(point.x - 100, -(point.y - 50), 0);
            
            vector.x += (Math.random() - 0.5) * 30;
            vector.y += (Math.random() - 0.5) * 30;
            vector.z += (Math.random() - 0.5) * 70;
            
            vertices.push(vector);
            
            tl.from(vector, {
                x: (600 / 2) - 100,
                y: (-552 / 2) + 50,
                z: 0,
                ease: "power2.inOut",
                duration: "random(2, 5)"
            },
            i * 0.002
            );
        }

        // 3. Crear la representación visual de los vértices (Nube de puntos/Partículas)
        const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
        const material = new THREE.PointsMaterial({ 
            color: 0x00ffcc, 
            size: 2, 
            transparent: true, 
            opacity: 0.9 
        });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // 4. Bucle de renderizado continuo
        function animate() {
            requestAnimationFrame(animate);

            // Actualizamos la geometría en cada frame con las posiciones que GSAP está animando
            geometry.setFromPoints(vertices);
            geometry.attributes.position.needsUpdate = true;

            // Rotación suave para apreciar el efecto tridimensional
            particles.rotation.y += 0.003;

            renderer.render(scene, camera);
        }
        animate();

        // Ajustar el lienzo si se cambia el tamaño de la pantalla
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
