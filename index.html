<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación de Corazón 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000; /* Fondo completamente negro como en tu imagen */
        }
        svg {
            display: none; /* Ocultamos el SVG, solo queremos sus datos matemáticos */
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
    <!-- Librerías necesarias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Trazado SVG de un corazón perfecto centrado en una caja de 600x552 -->
    <svg width="600" height="552" viewBox="0 0 600 552">
        <path id="corazon" d="M 300, 140 
             C 300, 140 240, 40 140, 40 
             C 40, 40 40, 160 40, 160 
             C 40, 260 180, 380 300, 480 
             C 420, 380 560, 260 560, 160 
             C 560, 160 560, 40 460, 40 
             C 360, 40 300, 140 300, 140 Z" />
    </svg>

    <script>
        // 1. Configuración de la Escena 3D
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Colocamos la cámara enfocando directamente al centro geométrico del corazón (300, -260)
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(300, -260, 380); 
        camera.lookAt(300, -260, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Generador de texturas para que las partículas brillen y sean redondas (no cuadrados feos)
        function crearTexturaParticula() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');      // Núcleo blanco brillante
            gradient.addColorStop(0.2, 'rgba(255, 80, 160, 0.9)');    // Rosa encendido
            gradient.addColorStop(0.5, 'rgba(255, 30, 120, 0.3)');    // Destello rosa difuminado
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');              // Transparente al borde
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        // Inicializamos la línea de tiempo de GSAP con autoplay e ida y vuelta continuo (yoyo)
        const tl = gsap.timeline({ repeat: -1, yoyo: true, repeatDelay: 1.5 });

        // 2. EL CÓDIGO DE TU IMAGEN (Acoplado perfectamente)
        const path = document.querySelector("#corazon");
        const length = path.getTotalLength();
        const vertices = [];

        // Generamos los miles de puntos rosa a lo largo de la silueta del corazón
        for (let i = 0; i < length; i += 0.1) {
            const point = path.getPointAtLength(i);
            const vector = new THREE.Vector3(point.x, -point.y, 0);
            
            // Añadimos el ruido tridimensional exacto de tu imagen
            vector.x += (Math.random() - 0.5) * 30;
            vector.y += (Math.random() - 0.5) * 30;
            vector.z += (Math.random() - 0.5) * 70;
            
            vertices.push(vector);
            
            // Animación desde el centro exacto (300, -276) hacia su posición final ruidosa
            tl.from(vector, {
                x: 600 / 2,
                y: -552 / 2,
                z: 0,
                ease: "power2.inOut",
                duration: "random(2, 5)"
            },
            i * 0.002
            );
        }

        // 3. Creación y Renderizado del Objeto de Partículas
        const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
        const material = new THREE.PointsMaterial({ 
            size: 3.5, 
            map: crearTexturaParticula(),
            transparent: true, 
            blending: THREE.AdditiveBlending, // Esto acumula la luz donde hay muchas partículas juntas
            depthWrite: false
        });
        
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // Bucle de renderizado constante
        function animate() {
            requestAnimationFrame(animate);

            // Transmitimos a la tarjeta gráfica las nuevas posiciones de los vectores animados por GSAP
            geometry.setFromPoints(vertices);
            geometry.attributes.position.needsUpdate = true;

            // Ligera rotación del corazón para apreciar que tiene profundidad en 3D
            particles.rotation.y = Math.sin(Date.now() * 0.001) * 0.15;

            renderer.render(scene, camera);
        }
        animate();

        // Control de pantalla adaptativo (si redimensionas el navegador)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
